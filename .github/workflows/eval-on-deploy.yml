# actionlint disable shellcheck
name: Evals After Deploy

on:
  workflow_run:
    workflows: ["Deploy on /deploy Command"]
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to comment and fetch deploy info from"
        required: true
        type: string
      engine_id:
        description: "Optional reasoning engine id (if omitted, will parse from PR comments)"
        required: false
        type: string
      environment:
        description: "Environment name (only staging runs evals)"
        required: false
        default: "staging"
        type: string

jobs:
  eval-staging:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    permissions:
      contents: read
      pull-requests: read
      issues: read
    env:
      DATABASE_HOST: "127.0.0.1"
      DATABASE_PORT: "5434"

    steps:
      - name: Resolve PR and deploy info
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            ENV_INPUT="${{ inputs.environment }}"
            ENGINE_ID_INPUT="${{ inputs.engine_id }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            PR_NUMBER=$(jq -r '.workflow_run.pull_requests[0].number // empty' "$GITHUB_EVENT_PATH")
            if [ -z "$PR_NUMBER" ]; then
              PR_NUMBER=$(gh api -H "Accept: application/vnd.github.groot-preview+json" \
                "repos/$REPO/commits/$SHA/pulls" --jq '.[0].number' || true)
            fi
          fi
          if [ -z "$PR_NUMBER" ]; then
            if [ "$EVENT" = "workflow_dispatch" ]; then
              echo "No PR provided for manual run."
            else
              echo "No PR found for SHA $SHA"
            fi
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$ENGINE_ID_INPUT" ]; then
            env="$(echo "${ENV_INPUT:-staging}" | tr '[:upper:]' '[:lower:]')"
            echo "env=$env" >> "$GITHUB_OUTPUT"
            echo "engine_id=$ENGINE_ID_INPUT" >> "$GITHUB_OUTPUT"
            if [ "$env" = "staging" ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          COMMENTS_JSON=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100")
          export COMMENTS_JSON
          python3 .github/scripts/parse_pr_comment.py
      - name: Stop if not staging
        if: steps.pr.outputs.should_run != 'true'
        run: |
          echo "Skipping evals: env is '${{ steps.pr.outputs.env }}'"
          exit 0

      - name: Comment evals started on PR
        if: steps.pr.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "🧪 **Evals started** to *staging*. I'll comment on the results here when done."

      - uses: actions/checkout@v4
        if: steps.pr.outputs.should_run == 'true'
        with:
          repository: prefeitura-rio/app-eai-agent-evals
          path: app-eai-agent-evals

      - name: Set up uv
        if: steps.pr.outputs.should_run == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: steps.pr.outputs.should_run == 'true'
        run: uv sync
        working-directory: app-eai-agent-evals

      # -----------------------------------------------------------------------
      # Infisical + GCP credentials (needed for Cloud SQL proxy auth + BigQuery)
      # -----------------------------------------------------------------------
      - name: Export secrets from Infisical
        if: steps.pr.outputs.should_run == 'true'
        uses: Infisical/secrets-action@v1.0.15
        with:
          method: universal
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ secrets.INFISICAL_PROJECT_SLUG_EVALS }}
          env-slug: staging
          domain: ${{ secrets.INFISICAL_URL }}

      - name: Verify GCP_SA_KEY is set
        if: steps.pr.outputs.should_run == 'true'
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "ERROR: GCP_SA_KEY is empty — check Infisical for 'staging'."
            exit 1
          fi
          echo "GCP_SA_KEY length: ${#GCP_SA_KEY}"

      - name: Decode GCP service account key
        if: steps.pr.outputs.should_run == 'true'
        run: |
          set -e
          printf '%s' "$GCP_SA_KEY" | tr -d '[:space:]' | base64 -d > /tmp/gcp-key.json
          echo "Key file size: $(wc -c < /tmp/gcp-key.json) bytes"
          python3 -c "import json; json.load(open('/tmp/gcp-key.json')); print('Key JSON: valid')"
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> "$GITHUB_ENV"
          echo "GCP_SERVICE_ACCOUNT_CREDENTIALS=$GCP_SA_KEY" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # cloud-sql-proxy — listens on 127.0.0.1:5434 for staging
      # -----------------------------------------------------------------------
      - name: Download cloud-sql-proxy
        if: steps.pr.outputs.should_run == 'true'
        run: |
          curl -fsSL -o /tmp/cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.1/cloud-sql-proxy.linux.amd64
          chmod +x /tmp/cloud-sql-proxy

      - name: Start cloud-sql-proxy
        if: steps.pr.outputs.should_run == 'true'
        run: |
          /tmp/cloud-sql-proxy "rj-superapp-staging:us-central1:postgres" --port 5434 &
          echo "Started cloud-sql-proxy (PID $!)"

      - name: Wait for PostgreSQL port 5434
        if: steps.pr.outputs.should_run == 'true'
        run: |
          echo "Waiting for port 5434..."
          for i in $(seq 1 30); do
            nc -z 127.0.0.1 5434 && echo "Port 5434 is ready after ${i}s" && exit 0
            sleep 2
          done
          echo "Timed out waiting for port 5434" && exit 1

      - name: Select evals
        if: steps.pr.outputs.should_run == 'true'
        id: evals_select
        run: |
          echo "evals=equipments,disaster,memory,servicos" >> "$GITHUB_OUTPUT"

      - name: Resolve prompt versions (from unified history)
        if: steps.pr.outputs.should_run == 'true'
        id: versions
        working-directory: app-eai-agent-evals
        run: |
          uv run python ../.github/scripts/resolve_prompt_versions.py
      - name: Check previous experiments in BigQuery
        if: steps.pr.outputs.should_run == 'true'
        id: prev_check
        working-directory: app-eai-agent-evals
        run: |
          uv run python ../.github/scripts/check_prev_experiments.py
        env:
          PREV_VERSION: ${{ steps.versions.outputs.prev_version_num }}
          EVALS_SELECTED: ${{ steps.evals_select.outputs.evals }}

      - name: Mark baseline start time
        if: steps.pr.outputs.should_run == 'true' && steps.prev_check.outputs.has_prev_experiments != 'true'
        id: baseline_start
        run: |
          echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run evals baseline (no reasoning engine)
        if: steps.pr.outputs.should_run == 'true' && steps.prev_check.outputs.has_prev_experiments != 'true'
        run: |
          EVALS="${{ steps.evals_select.outputs.evals }}"
          IFS=',' read -ra ITEMS <<< "$EVALS"
          for eval_name in "${ITEMS[@]}"; do
            eval_name="$(echo "$eval_name" | xargs)"
            case "$eval_name" in
              equipments) script="run_equipments.py" ;;
              disaster) script="run_disaster_eval.py" ;;
              memory) script="run_memory_experiment.py" ;;
              servicos) script="run_servicos.py" ;;
              *) echo "Unknown eval: $eval_name" && exit 1 ;;
            esac
            for i in 1 2 3; do
              echo "Run $i/3: $eval_name (baseline)"
              uv run "src/evaluations/core/experiments/eai/$script"
            done
          done
        working-directory: app-eai-agent-evals

      - name: Mark current start time
        if: steps.pr.outputs.should_run == 'true'
        id: current_start
        run: |
          echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Run evals current (with reasoning engine)
        if: steps.pr.outputs.should_run == 'true'
        run: |
          EVALS="${{ steps.evals_select.outputs.evals }}"
          IFS=',' read -ra ITEMS <<< "$EVALS"
          for eval_name in "${ITEMS[@]}"; do
            eval_name="$(echo "$eval_name" | xargs)"
            case "$eval_name" in
              equipments) script="run_equipments.py" ;;
              disaster) script="run_disaster_eval.py" ;;
              memory) script="run_memory_experiment.py" ;;
              servicos) script="run_servicos.py" ;;
              *) echo "Unknown eval: $eval_name" && exit 1 ;;
            esac
            for i in 1 2 3; do
              echo "Run $i/3: $eval_name (current)"
              uv run "src/evaluations/core/experiments/eai/$script" \
                --reasoning-engine-id "${REASONING_ENGINE_ID}"
            done
          done
        env:
          REASONING_ENGINE_ID: ${{ steps.pr.outputs.engine_id }}
        working-directory: app-eai-agent-evals

      - name: Mark current end time
        if: steps.pr.outputs.should_run == 'true'
        id: current_end
        run: |
          echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Mark baseline end time
        if: steps.pr.outputs.should_run == 'true' && steps.prev_check.outputs.has_prev_experiments != 'true'
        id: baseline_end
        run: |
          echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Fetch previous metrics from BigQuery
        if: steps.pr.outputs.should_run == 'true'
        working-directory: app-eai-agent-evals
        run: |
          uv run python ../.github/scripts/fetch_prev_metrics.py
        env:
          PREV_VERSION: ${{ steps.versions.outputs.prev_version_num }}
          EVALS_SELECTED: ${{ steps.evals_select.outputs.evals }}
          HAS_PREV: ${{ steps.prev_check.outputs.has_prev_experiments }}
          BASELINE_START: ${{ steps.baseline_start.outputs.ts }}
          BASELINE_END: ${{ steps.baseline_end.outputs.ts }}

      - name: Fetch current metrics from BigQuery
        if: steps.pr.outputs.should_run == 'true'
        working-directory: app-eai-agent-evals
        run: |
          uv run python ../.github/scripts/fetch_current_metrics.py
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current_version_num }}
          EVALS_SELECTED: ${{ steps.evals_select.outputs.evals }}
          CURRENT_START: ${{ steps.current_start.outputs.ts }}
          CURRENT_END: ${{ steps.current_end.outputs.ts }}

      - name: Compare averages and write summary
        if: steps.pr.outputs.should_run == 'true'
        working-directory: app-eai-agent-evals
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current_version_display }}
          PREV_VERSION: ${{ steps.versions.outputs.prev_version_display }}
          HAS_PREV: ${{ steps.prev_check.outputs.has_prev_experiments }}
          EVALS_SELECTED: ${{ steps.evals_select.outputs.evals }}
        run: |
          python3 ../.github/scripts/compare_averages.py
      - name: Comment eval results on PR
        if: steps.pr.outputs.should_run == 'true'
        working-directory: app-eai-agent-evals
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          CURRENT_VERSION: ${{ steps.versions.outputs.current_version_display }}
          PREV_VERSION: ${{ steps.versions.outputs.prev_version_display }}
          EVALS_SELECTED: ${{ steps.evals_select.outputs.evals }}
        run: |
          python3 ../.github/scripts/comment_eval_results.py
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body-file tmp/pr_comment.md

      - name: Comment eval failure on PR
        if: failure() && steps.pr.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "❌ **Evals failed**. See the action logs for details."

      - name: Fail workflow on regressions > 5%
        if: steps.pr.outputs.should_run == 'true'
        working-directory: app-eai-agent-evals
        run: |
          python3 ../.github/scripts/fail_on_regressions.py
